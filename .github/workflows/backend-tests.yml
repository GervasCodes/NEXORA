name: Backend & Frontend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit + mocked-integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit + integration suite with coverage
        working-directory: backend
        run: npm run test:coverage

  backend-db-integration:
    name: Backend real-database integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Start MySQL via docker-compose
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for MySQL to be healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose -f docker-compose.test.yml ps -q mysql-test)")
            if [ "$status" = "healthy" ]; then
              echo "MySQL is healthy"
              exit 0
            fi
            echo "Waiting for MySQL ($i/30)..."
            sleep 2
          done
          echo "MySQL did not become healthy in time"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Install database (migration runner) dependencies
        working-directory: database
        run: npm ci

      - name: Run migrations against the test database
        working-directory: database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: nexora_test
          DB_SSL: "false"
        run: node migrate.js

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run real-database integration suite
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: nexora_test
          DB_SSL: "false"
        run: npm run test:db

      - name: Tear down MySQL
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  frontend:
    name: Frontend tests + build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend test suite
        working-directory: frontend
        run: npm test

      - name: Build (compile-check)
        working-directory: frontend
        run: npm run build
