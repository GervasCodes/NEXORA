name: CI

# Runs on every push/PR touching the backend or frontend so a broken test
# or a build that no longer compiles is caught before merge, not after
# deploy. Two independent jobs (backend-test / frontend-build) so a
# frontend-only PR doesn't wait on Node matrix backend runs and vice
# versa - see each job's `paths` filter below.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Run against both the minimum supported version (backend/package.json
        # engines.node >=18) and the current LTS, so a bug that only shows up
        # on one Node version doesn't slip through.
        node-version: ["18.x", "20.x"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit + integration tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 14

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (compile-check every page/component)
        # There's no dedicated frontend test suite yet (see backend/README.md
        # "What remains" from Phase 10) - `vite build` at least guarantees
        # every file imports cleanly and the JSX/bundle compiles, catching
        # the class of error a manual review can miss (see Phase 9's "no
        # npm install available" verification note).
        run: npm run build
