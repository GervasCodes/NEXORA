<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070912" />
    <title>You're offline — NEXORA</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070912;
            color: #f7f8fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
            text-align: center;
            padding: 24px;
        }
        .card { max-width: 360px; }
        h1 { font-size: 1.25rem; margin: 0 0 8px; }
        p { color: rgba(247, 248, 251, 0.6); font-size: 0.9rem; line-height: 1.5; margin: 0 0 20px; }
        button {
            background: #f5a623;
            color: #070912;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:hover { background: #d68d0f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>You're offline</h1>
        <p>This page hasn't been saved for offline viewing. Pages and products you've already browsed are still available - check your recent activity, or try again once you're back online.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
